<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu GPS Web</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 80%; max-width: 400px; }
        button { background-color: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        #status { margin-top: 20px; font-weight: bold; color: #555; }
        .data { margin-top: 15px; text-align: left; background: #f8f9fa; padding: 10px; border-radius: 5px; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Onde estou?</h2>
        <button onclick="buscarLocalizacao()">Obter Localização</button>
        <p id="status">Clique no botão para iniciar</p>
        
        <div id="resultado" class="data">
            <p><strong>Latitude:</strong> <span id="lat">-</span></p>
            <p><strong>Longitude:</strong> <span id="lon">-</span></p>
            <p><strong>Precisão:</strong> <span id="acc">-</span> metros</p>
            <a id="linkMapa" href="#" target="_blank" style="color: #007bff; text-decoration: none; font-weight: bold;">Ver no Google Maps</a>
        </div>
        <button onclick="window.location.href= 'trajeto.html'">Trajeto</button>
        
    </div>

    <script>
        function buscarLocalizacao() {
            const status = document.getElementById('status');
            const resultado = document.getElementById('resultado');

            if (!navigator.geolocation) {
                status.textContent = "Geolocalização não suportada pelo seu navegador.";
                return;
            }

            status.textContent = "Localizando...";

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const { latitude, longitude, accuracy } = pos.coords;
                    
                    document.getElementById('lat').textContent = latitude.toFixed(6);
                    document.getElementById('lon').textContent = longitude.toFixed(6);
                    document.getElementById('acc').textContent = Math.round(accuracy);
                    
                    const link = `https://www.google.com/maps?q=${latitude},${longitude}`;
                    document.getElementById('linkMapa').href = link;

                    status.textContent = "Localização encontrada!";
                    resultado.style.display = "block";
                },
                (err) => {
                    status.textContent = `Erro: ${err.message}`;
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }
    </script>
</body>
</html>
